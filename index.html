<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Manager Pro - Secure</title>
    <link class="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen font-sans">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 w-full max-w-md transition-all">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">DATA PRO</h1>
                <p class="text-xs font-mono text-slate-500 mt-2 uppercase tracking-widest">Portal Akses Terbatas</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Email Akses</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" required class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none text-sm dark:text-white" placeholder="admin@datapro.com">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 uppercase tracking-wider">Kata Sandi</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="password" required class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none text-sm dark:text-white" placeholder="••••••••">
                    </div>
                </div>

                <p id="loginError" class="text-xs font-bold text-rose-500 text-center bg-rose-50 dark:bg-rose-950/30 p-2 rounded-lg hidden"></p>

                <button type="submit" class="w-full py-3.5 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-xl shadow-lg shadow-indigo-500/30 transition cursor-pointer active:scale-95 flex justify-center items-center gap-2 mt-4">
                    <span id="btnLoginText">MASUK</span>
                    <i id="btnLoginIcon" class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="mainAppContainer" class="hidden max-w-5xl mx-auto p-4 sm:p-6 lg:p-8 transition-opacity duration-500">
        
        <header class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-indigo-600 dark:text-indigo-400">DATA PRO</h1>
                <p id="saveIndicator" class="text-[11px] sm:text-xs font-mono text-slate-500 mt-1 uppercase tracking-widest">
                    MENUNGGU DATA...
                </p>
            </div>
            
            <div class="flex gap-2">
                <button id="btnLogout" class="px-4 py-2 rounded-xl bg-rose-50 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400 shadow-sm border border-rose-200 dark:border-rose-800 hover:scale-105 transition cursor-pointer font-bold text-xs flex items-center gap-2">
                    <i class="fa-solid fa-power-off"></i> <span class="hidden sm:inline">LOGOUT</span>
                </button>
                <button id="themeToggle" class="p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:scale-105 transition cursor-pointer">
                    <i id="themeIcon" class="fa-solid fa-sun text-amber-400"></i>
                </button>
            </div>
        </header>

        <nav class="flex overflow-x-auto gap-1 mb-6 bg-white dark:bg-slate-800 p-1.5 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700">
            <button onclick="switchTab('rumah_tangga')" id="tab-rumah_tangga" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2">
                <i class="fa-solid fa-house"></i> RT I
            </button>
            <button onclick="switchTab('usaha_micro')" id="tab-usaha_micro" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-shop"></i> UM I
            </button>
            <button onclick="switchTab('verifikasi')" id="tab-verifikasi" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-house-user"></i> RT II
            </button>
            <button onclick="switchTab('opsi_lain')" id="tab-opsi_lain" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-store"></i> UM II
            </button>
            <button onclick="switchTab('verif')" id="tab-verif" class="flex-1 min-w-fit px-4 py-3 rounded-xl text-sm transition cursor-pointer flex items-center justify-center gap-2 text-slate-500">
                <i class="fa-solid fa-user-check"></i> Verif
            </button>
        </nav>

        <div id="inputSection" class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-200 dark:border-slate-700 mb-6 transition-all">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-2 h-6 bg-indigo-500 rounded-full"></div>
                <h2 class="text-lg font-bold">Input Data <span id="inputCategoryName" class="text-indigo-500 italic">RT I</span></h2>
            </div>
            <textarea id="rawInput" rows="6" class="w-full p-4 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none font-mono text-sm dark:text-white text-slate-900" placeholder="Tempel data baris untuk kategori ini di sini..."></textarea>
            
            <div class="flex flex-wrap sm:flex-nowrap justify-between gap-3 mt-4">
                <button id="btnLoadData" class="w-full sm:w-auto px-8 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition cursor-pointer active:scale-95 text-sm">
                    MUAT DATA
                </button>
                <button id="btnInitImport" onclick="handleImportTrigger()" class="w-full sm:w-auto px-5 py-3 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-200 font-bold rounded-xl hover:bg-slate-200 dark:hover:bg-slate-600 transition cursor-pointer text-xs flex items-center justify-center gap-2 border border-slate-200 dark:border-slate-700">
                    <i class="fa-solid fa-upload text-indigo-500"></i> Punya file cadangan (.json)? Impor di sini
                </button>
            </div>
        </div>

        <div id="mainDashboard" class="hidden">
            <div class="flex flex-wrap gap-4 justify-between items-center mb-4">
                <div class="flex flex-wrap gap-2">
                    <button id="btnShuffle" class="p-3 bg-amber-100 dark:bg-amber-950/30 text-amber-600 dark:text-amber-400 rounded-xl border border-amber-200 dark:border-amber-900 transition hover:scale-105 cursor-pointer" title="Acak Baris">
                        <i class="fa-solid fa-shuffle"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">ACAK</span>
                    </button>
                    <button id="btnReset" class="p-3 bg-blue-100 dark:bg-blue-950/30 text-blue-600 dark:text-blue-400 rounded-xl border border-blue-200 dark:border-blue-900 transition hover:scale-105 cursor-pointer" title="Reset Urutan">
                        <i class="fa-solid fa-rotate-left"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">RESET</span>
                    </button>
                    <button id="btnMarkAll" class="p-3 bg-rose-100 dark:bg-rose-950/30 text-rose-600 dark:text-rose-400 rounded-xl border border-rose-200 dark:border-rose-900 transition hover:scale-105 cursor-pointer" title="Tandai Semua Sebagai X">
                        <i class="fa-solid fa-list-check"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">MARK ALL</span>
                    </button>
                    <button id="btnUnmarkAll" class="p-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-xl border border-slate-200 dark:border-slate-700 transition hover:scale-105 cursor-pointer hover:text-rose-500 dark:hover:text-rose-400" title="Hapus Semua Tanda X">
                        <i class="fa-solid fa-eraser"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">UNMARK</span>
                    </button>
                    <button id="btnToggleNotes" class="p-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-xl border border-slate-200 dark:border-slate-700 transition hover:scale-105 cursor-pointer hover:text-indigo-500 dark:hover:text-indigo-400" title="Buka Catatan Digit">
                        <i class="fa-regular fa-clipboard"></i> <span class="text-xs font-bold ml-1 hidden sm:inline">CATATAN</span>
                    </button>
                    <button id="btnToggleSearch" class="p-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 rounded-xl border border-slate-200 dark:border-slate-700 transition hover:scale-105 cursor-pointer hover:text-indigo-500 dark:hover:text-indigo-400" title="Cari Data">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
                
                <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                    <button id="btnExport" class="flex-1 sm:flex-none px-4 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-xl border border-slate-200 dark:border-slate-700 transition cursor-pointer text-xs">
                        <i class="fa-solid fa-download mr-1.5 text-emerald-500"></i> EXPORT
                    </button>
                    <button id="btnImport" class="flex-1 sm:flex-none px-4 py-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-bold rounded-xl border border-slate-200 dark:border-slate-700 transition cursor-pointer text-xs">
                        <i class="fa-solid fa-upload mr-1.5 text-indigo-500"></i> IMPORT
                    </button>
                    <input type="file" id="fileImport" class="hidden" accept=".json">

                    <button id="btnClear" class="w-full sm:w-auto px-5 py-3 bg-rose-50 dark:bg-rose-950/20 text-rose-600 dark:text-rose-400 font-bold rounded-xl border border-rose-100 dark:border-rose-900 transition hover:bg-rose-600 hover:text-white cursor-pointer text-xs">
                        <i class="fa-solid fa-trash-can mr-1.5"></i> GANTI DATA
                    </button>
                </div>
            </div>

            <div id="notesContainer" class="hidden mb-4 transition-all duration-200">
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-inner">
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="notesInput" class="text-[11px] font-black uppercase tracking-widest text-slate-400 flex items-center gap-1.5">
                            <i class="fa-solid fa-pen-to-square text-indigo-500"></i> MEMO / DIGIT TERAKHIR YANG DISALIN
                        </label>
                        <span class="text-[10px] text-slate-400 italic">Otomatis Tersimpan</span>
                    </div>
                    <textarea id="notesInput" rows="2" class="w-full p-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none font-mono text-sm text-slate-900 dark:text-white" placeholder="Ketik digit atau catatan penting Anda di sini agar tidak lupa..."></textarea>
                </div>
            </div>

            <div id="searchContainer" class="hidden mb-4 transition-all duration-200">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-slate-400">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input type="text" id="searchInput" class="w-full pl-10 pr-10 py-3 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-4 focus:ring-indigo-500/20 focus:outline-none text-sm dark:text-white text-slate-900 font-mono tracking-wider" placeholder="Ketik kata kunci untuk mencari data...">
                    <button id="btnClearSearch" class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-slate-400 hover:text-rose-500 transition hidden">
                        <i class="fa-solid fa-circle-xmark"></i>
                    </button>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex flex-wrap justify-between items-center gap-4">
                    <div class="flex flex-wrap gap-x-4 gap-y-2 text-xs font-black uppercase tracking-widest">
                        <div class="text-slate-400">TOTAL: <span id="totalCount" class="text-indigo-600 dark:text-indigo-400 ml-1">0</span></div>
                        <div class="text-slate-400 border-l border-slate-300 dark:border-slate-600 pl-4">AKTIF: <span id="activeCount" class="text-emerald-600 dark:text-emerald-400 ml-1">0</span></div>
                        <div class="text-slate-400 border-l border-slate-300 dark:border-slate-600 pl-4">TANDA X: <span id="xCount" class="text-rose-600 dark:text-rose-400 ml-1">0</span></div>
                    </div>
                    <span class="text-[11px] text-slate-400 italic">Data X otomatis bergeser paling bawah</span>
                </div>
                <div id="dataListContainer" class="divide-y divide-slate-100 dark:divide-slate-700 max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-8 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-50 text-sm font-bold tracking-tight">
            TELAH DISALIN!
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
